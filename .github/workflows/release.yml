name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            label: "macOS (Universal)"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            # Stable cache key fragment — avoid commas (actions/cache rejects them).
            cache-tag: macos-universal
            args: "--target universal-apple-darwin"
          - os: windows-latest
            label: "Windows (x64)"
            rust-targets: "x86_64-pc-windows-msvc"
            cache-tag: windows-x64
            args: ""
          - os: ubuntu-22.04
            label: "Linux (x64)"
            rust-targets: "x86_64-unknown-linux-gnu"
            cache-tag: linux-x64
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-targets }}

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.platform.cache-tag }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.platform.cache-tag }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # The frontend bundles public/CHANGELOG.md so the running app can show
      # the current version's notes offline. We feed the SAME file to
      # tauri-action as `releaseBody` so three surfaces stay in sync:
      #   - GitHub Release page (browser users)
      #   - latest.json `body` field → in-app updater popover
      #   - public/CHANGELOG.md → in-app "更新内容" card (current version)
      # public/CHANGELOG.md is expected to contain ONLY the current version's
      # notes (single-version file). Historical changelogs live on the
      # GitHub Releases page (and in git tags).
      - name: Compose release body from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_NOTES_EOF'
            if [ -f public/CHANGELOG.md ]; then
              cat public/CHANGELOG.md
            else
              echo "_No public/CHANGELOG.md found — update it before tagging a release._"
            fi
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the Tauri updater. Generate locally with:
          #   bunx tauri signer generate -- -w ~/.tauri/imagemanager.key
          # Then add both to the repo Secrets:
          #   - TAURI_SIGNING_PRIVATE_KEY = contents of the .key file
          #   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD = the passphrase
          # The public key half goes into `plugins.updater.pubkey` in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: "ImageManager ${{ steps.tag.outputs.value }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # Produces latest.json alongside the binaries — that's what the
          # frontend updater plugin fetches to learn about new versions.
          includeUpdaterJson: true
          args: ${{ matrix.platform.args }}
